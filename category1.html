<style>
/*********************************
 RESET
**********************************/
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  overflow-x:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0b111b;
  color:#fff;
}

/*********************************
 ROOT VARIABLES
**********************************/
:root{
  --bg:#0b111b;
  --card:#111827;
  --card2:#0f172a;
  --text:#ffffff;
  --muted:#94a3b8;
  --brand:#22c55e;
  --border:rgba(255,255,255,.08);
  --radius:18px;
  --shadow:0 10px 25px rgba(0,0,0,.35);
}

/*********************************
 PAGE WRAPPER
**********************************/
.container{
  width:100%;
  max-width:1600px;
  margin:auto;
  padding:20px;
}

/*********************************
 HEADER
**********************************/
.page-header{
  margin-bottom:30px;
}

.page-header h1{
  font-size:clamp(2rem,5vw,3rem);
  font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(135deg,#22c55e,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.page-header p{
  color:var(--muted);
  font-size:1rem;
  line-height:1.6;
}

/*********************************
 SEARCH
**********************************/
.search-wrap{
  margin:25px 0 35px;
  position:relative;
}

.search-wrap input{
  width:100%;
  height:58px;
  border:none;
  outline:none;
  padding:0 55px 0 18px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  font-size:1rem;
  backdrop-filter:blur(10px);
}

.search-wrap input::placeholder{
  color:#94a3b8;
}

.search-icon{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  color:#94a3b8;
  font-size:1rem;
}

/*********************************
 CATEGORY GRID
 MOBILE = 4 PER ROW
 BIG SCREEN = AUTO FIT MORE
**********************************/
.category-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

/*********************************
 CATEGORY CARD
**********************************/
.category-card{
  background:linear-gradient(180deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,.06);
  border-radius:22px;
  padding:18px 10px;
  text-decoration:none;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  transition:.25s ease;
  position:relative;
  overflow:hidden;
  min-height:140px;
}

.category-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);
  pointer-events:none;
}

.category-card:hover{
  transform:translateY(-4px);
  border-color:rgba(34,197,94,.4);
  box-shadow:0 12px 30px rgba(0,0,0,.4);
}

/*********************************
 CIRCLE ICON
**********************************/
.icon-circle{
  width:74px;
  height:74px;
  border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#06b6d4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.6rem;
  box-shadow:0 8px 20px rgba(34,197,94,.3);
  flex-shrink:0;
}

.category-name{
  text-align:center;
  font-size:.95rem;
  font-weight:600;
  line-height:1.4;
  word-break:break-word;
}

/*********************************
 BADGE
**********************************/
.count{
  margin-top:4px;
  font-size:.78rem;
  color:#94a3b8;
}

/*********************************
 RESPONSIVE
**********************************/
@media (min-width:640px){
  .category-grid{
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  }
}

@media (max-width:480px){

  .container{
    padding:14px;
  }

  .category-grid{
    grid-template-columns:repeat(4,1fr);
    gap:10px;
  }

  .category-card{
    min-height:115px;
    padding:14px 6px;
    border-radius:18px;
  }

  .icon-circle{
    width:56px;
    height:56px;
    font-size:1.2rem;
  }

  .category-name{
    font-size:.76rem;
  }

  .count{
    font-size:.68rem;
  }

  .search-wrap input{
    height:52px;
    font-size:.95rem;
  }
}

/*********************************
 TABLET
**********************************/
@media (min-width:768px){
  .category-grid{
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  }
}

/*********************************
 DESKTOP
**********************************/
@media (min-width:1200px){
  .category-grid{
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  }
}

/*********************************
 HUGE SCREENS
**********************************/
@media (min-width:1600px){
  .category-grid{
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  }
}

/*********************************
 EMPTY STATE
**********************************/
.empty-state{
  display:none;
  text-align:center;
  padding:60px 20px;
  color:#94a3b8;
  font-size:1.1rem;
}
</style>

/***************************************************
 RENDER CATEGORIES
****************************************************/
const categoryGrid = document.getElementById("categoryGrid");
const emptyState = document.getElementById("emptyState");

function renderCategories(items){

  categoryGrid.innerHTML = "";

  if(items.length === 0){
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";

  items.forEach(cat => {

    const card = document.createElement("a");

    /********************************************
     REDIRECT OPTIONS
     
     OPTION 1:
     index.html?category=watches
     
     OPTION 2:
     Your index page can filter automatically
    *********************************************/
    card.href = `index.html?category=${encodeURIComponent(cat.slug)}`;

    card.className = "category-card";

    card.innerHTML = `
      <div class="icon-circle">
        <i class="fa-solid ${cat.icon}"></i>
      </div>

      <div class="category-name">
        ${cat.name}
      </div>

      <div class="count">
        ${cat.count} Products
      </div>
    `;

    categoryGrid.appendChild(card);

  });

}

renderCategories(categories);

/***************************************************
 SEARCH FILTER
****************************************************/
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function(){

  const value = this.value.toLowerCase().trim();

  const filtered = categories.filter(cat =>
    cat.name.toLowerCase().includes(value)
  );

  renderCategories(filtered);

});
